server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Servir principal.html como página de inicio
    location = / {
        try_files /html/principal.html =404;
    }

    # Servir archivos HTML desde la carpeta html/
    location ~ \.html$ {
        try_files /html$uri $uri =404;
    }

    # Configuración para servir archivos estáticos
    location / {
        try_files $uri $uri/ =404;
    }

    # Configuración para archivos CSS
    location ~* \.css$ {
        add_header Content-Type text/css;
        expires 1y;
        access_log off;
    }

    # Configuración para archivos JavaScript
    location ~* \.js$ {
        add_header Content-Type application/javascript;
        expires 1y;
        access_log off;
    }

    # Configuración para imágenes
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp)$ {
        expires 1y;
        access_log off;
    }

    # Deshabilitar logs de archivos no encontrados
    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }

    # Proxy para conectar con la API (opcional, si necesitas conectar desde el frontend)
    location /api/ {
        proxy_pass http://api_srv:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
