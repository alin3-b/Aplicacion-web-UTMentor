<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Donar</title>
  <link rel="stylesheet" href="../css/donar.css">

  <!-- Stripe.js -->
  <script src="https://js.stripe.com/v3/"></script>
</head>

<body>
  <div class="circle-bg"></div>
  <!-- NAV -->
  <header class="nav-wrap" role="banner">
    <nav class="nav" aria-label="Principal">

      <a href="principal.html" class="brand" aria-label="Ir al inicio">
        <img src="../imagenes/logo.png" alt="UTMentor">
      </a>

      <button class="burger"
        aria-label="Abrir menú"
        aria-expanded="false"
        aria-controls="mobile-panel">
        <span class="burger-box">
          <span class="burger-line"></span>
        </span>
        <span class="burger-label">Menú</span>
      </button>

      <div id="mobile-panel" class="panel" role="group" aria-label="Acciones">
        <div class="links">
          <a class="link" href="iniciarSesion.html">Iniciar sesión</a>
          <a class="link cta" href="registro.html">Registrarse</a>
        </div>
      </div>

    </nav>
  </header>

  <div class="container">
    <h2>Donar a la App</h2>
    <label for="amount">Cantidad a donar (MXN):</label>
    <div style="display: flex; flex-direction: column; align-items: center; margin-bottom: 20px;">
      
      <input type="number" id="amount" value="50" min="10" style="width: 100%; padding: 12px; margin-top: 8px;" />
    </div>


    <div id="loader">⏳ Procesando...</div>

    <!-- Contenedor para el Payment Element -->
    <div id="payment-element"></div>

    <button id="submit"
      style="width:100%; margin-top:20px; padding:12px; background:#6772e5; color:white; border:none; border-radius:5px;">
      Donar
    </button>

    <div id="mensaje"></div>
  </div>
  
  <script type="module" src="../js/donar.js"></script>
</body>
</html>
