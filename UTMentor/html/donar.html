<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Donar</title>

  <!-- Stripe.js -->
  <script src="https://js.stripe.com/v3/"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background: #f5f5f5;
    }

    .container {
      max-width: 420px;
      margin: auto;
      background: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 0 12px rgba(0,0,0,0.1);
    }

    #mensaje {
      margin-top: 20px;
      padding: 12px;
      border-radius: 6px;
      display: none;
      font-weight: bold;
    }

    #mensaje.ok {
      background: #d4ffd4;
      color: #0f7b0f;
      border: 1px solid #4dbe4d;
    }

    #mensaje.error {
      background: #ffd4d4;
      color: #7b0f0f;
      border: 1px solid #be4d4d;
    }
  </style>
</head>

<body>
  <div class="container">
    <h2>Donar a la App</h2>

    <label for="amount">Cantidad a donar (MXN):</label>
    <input type="number" id="amount" value="50" min="10"
      style="width: 100%; padding: 10px; margin-bottom: 20px;" />

    <!-- Contenedor para el Payment Element -->
    <div id="payment-element"></div>

    <button id="submit"
      style="width:100%; margin-top:20px; padding:12px; background:#6772e5; color:white; border:none; border-radius:5px;">
      Donar
    </button>

    <!-- Mensaje dinámico en la misma página -->
    <div id="mensaje"></div>
  </div>

  <script>
    const stripe = Stripe("pk_test_51STq7ZF3d8y3BiJnJqaXNEFHJc4WQs8WzjXmCd4ENlblsFGVHRPVjRjp6gBFxw3P5KS593DjoxScDh169C0WIxUh00ryapalUb"); // REEMPLAZA

    let elements;
    let clientSecretActual = null;

    async function generarIntentoPago() {
      const amount = Number(document.getElementById("amount").value);

      const res = await fetch("http://localhost:3000/api/pagos/donar", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ amount })
      });

      const data = await res.json();
      clientSecretActual = data.clientSecret;

      elements = stripe.elements({ clientSecret: clientSecretActual });
      const paymentElement = elements.create("payment");
      paymentElement.mount("#payment-element");
    }

    generarIntentoPago(); // Se crea al entrar a la página

    document.getElementById("submit").addEventListener("click", async () => {
      const mensaje = document.getElementById("mensaje");
      mensaje.style.display = "none";

      const { error } = await stripe.confirmPayment({
        elements,
        confirmParams: {
          return_url: window.location.href // NO redirige porque manejamos la respuesta abajo
        },
        redirect: "if_required"
      });

      if (error) {
        mensaje.innerText = "❌ Error en el pago: " + error.message;
        mensaje.className = "error";
        mensaje.style.display = "block";
      } else {
        mensaje.innerText = "✅ ¡Gracias por tu donación! Pago completado.";
        mensaje.className = "ok";
        mensaje.style.display = "block";
      }
    });
  </script>
</body>
</html>
