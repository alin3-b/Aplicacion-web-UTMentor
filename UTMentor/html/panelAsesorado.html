<!doctype html>
<html lang="es" class="no-js">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Panel de Asesorado · UTMentor</title>

  <!-- Reutiliza el tema claro del panel del asesor -->
  <link rel="preload" href="../css/panelAsesor.css" as="style">
  <link rel="stylesheet" href="../css/panelAsesor.css">
</head>
<body>
  <!-- Lateral -->
  <aside class="sidebar" aria-label="Navegación lateral">
    <div class="brand">
      <img src="../imagenes/logo.png" alt="UTMentor" />
    </div>

    <nav class="side-nav">
      <button class="side-link is-active" data-view="sesiones">
        <span>Mis sesiones</span>
      </button>
      <button class="side-link" href="explorar.html">
        <span>Explorar</span>
      </button>
      <button class="side-link" data-view="perfil">
        <span>Perfil</span>
      </button>
      <button class="side-link" data-action="switch-role">
        <span>Cambiar a asesor</span>
      </button>
    </nav>

    <div class="side-footer">
      <button class="link-danger" data-action="delete-account">Eliminar perfil</button>
      <button class="link" data-action="logout">Cerrar sesión</button>
    </div>
  </aside>

  <!-- Contenido -->
  <main class="main">
    <header class="topbar" role="banner">
      <div class="user-chip">
        <img id="chipAvatar" src="../imagenes/adviser2.jpg" alt="Foto de perfil" />
        <div>
          <strong id="chipName">Lucía Hernández</strong>
          <small id="chipCareer">Ing. Computación · 5º</small>
        </div>
      </div>

      <div class="week-controls" aria-label="Selector semanal">
        <button class="btn ghost" id="prevWeek" aria-label="Semana anterior">←</button>
        <div class="week-label" id="weekLabel" aria-live="polite"></div>
        <button class="btn ghost" id="nextWeek" aria-label="Semana siguiente">→</button>
        <button class="btn ghost" id="thisWeek">Esta semana</button>
      </div>
    </header>

    <!-- Vista: Mis sesiones -->
    <section class="view is-visible" id="view-sesiones" aria-labelledby="h-sesiones">
      <div class="view-head">
        <h2 id="h-sesiones" class="h">Mis sesiones</h2>
        <a class="action-link" href="explorar.html">
            <svg class="i" viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="11" cy="11" r="6" fill="none" stroke="currentColor" stroke-width="2"/>
                <line x1="16.5" y1="16.5" x2="21" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            Explorar asesores
        </a>
      </div>
      <p class="muted">Aquí ves y gestionas las sesiones de <strong>la semana seleccionada</strong>.</p>

      <ul class="cards" id="sessionsList" aria-live="polite"></ul>

      <template id="sessionCardTpl">
        <li class="card session">
          <div class="session-row">
            <div class="session-meta">
              <span class="badge" data-slot="mode">Virtual</span>
              <strong data-slot="title">Cálculo integral</strong>
              <span class="dim" data-slot="date">Mar 12:00–13:00</span>
            </div>
            <div class="session-actions">
              <button class="btn icon" data-action="toggle">
                <span aria-hidden="true">＋</span><span class="sr-only">Ver detalles</span>
              </button>
              <button class="btn danger" data-action="cancel">Cancelar</button>
            </div>
          </div>
          <div class="session-detail" hidden>
            <dl class="dl">
              <div><dt>Asesor:</dt><dd data-slot="tutor">—</dd></div>
              <div><dt>Tema:</dt><dd data-slot="title2">—</dd></div>
              <div><dt>Área:</dt><dd data-slot="area">—</dd></div>
              <div><dt>Tipo:</dt><dd data-slot="type">—</dd></div>
              <div><dt>Precio:</dt><dd data-slot="price">$0</dd></div>
              <div><dt>Notas:</dt><dd data-slot="notes">—</dd></div>
            </dl>
          </div>
        </li>
      </template>
    </section>

    <!-- Vista: Perfil -->
    <section class="view" id="view-perfil" aria-labelledby="h-perfil">
      <h2 id="h-perfil" class="h">Perfil</h2>

      <div class="profile">
        <div class="profile-photo">
          <img id="profileAvatar" src="../imagenes/adviser2.jpg" alt="Foto de perfil" />
          <label class="btn ghost mt">
            Cargar foto
            <input id="photoInput" type="file" accept="image/*" hidden>
          </label>
        </div>

        <form id="profileForm" class="form" novalidate>
          <div class="grid">

            <label class="field">
              <span class="label">Nombre completo</span>
              <input id="pName" type="text" required>
            </label>

            <label class="field">
              <span class="label">Carrera</span>
              <input id="pCareer" type="text" required>
            </label>

            <label class="field">
              <span class="label">Semestre</span>
              <input id="pSemester" type="number" min="1" max="12" required>
            </label>

            <label class="field">
              <span class="label">Correo electrónico</span>
              <input id="pEmail" type="email" disabled>
              <small class="hint">No se puede modificar.</small>
            </label>

            <label class="field">
              <span class="label">Contraseña</span>
              <input id="pPassword" type="password" placeholder="••••••••">
              <small class="hint">Déjalo vacío para no cambiarla.</small>
            </label>
          </div>

          <div class="form-actions">
            <button class="btn" type="submit">Guardar perfil</button>
          </div>
        </form>
      </div>
    </section>
  </main>

  <!-- Toast + confirm -->
  <div class="toast" id="toast" role="status" aria-live="polite" hidden></div>
  <dialog class="confirm" id="confirmDlg">
    <form method="dialog">
      <p id="confirmMsg">¿Confirmas esta acción?</p>
      <menu>
        <button value="cancel" class="btn ghost">Cancelar</button>
        <button value="ok" class="btn danger">Confirmar</button>
      </menu>
    </form>
  </dialog>

  <script src="../js/panelAsesorado.js" defer></script>
</body>
</html>
