name: Deploy to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: utmentor-app
  REGISTRY_NAME: utmentorregistryy

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Azure Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY_NAME }}.azurecr.io
        username: ${{ secrets.AZURE_REGISTRY_USERNAME }}
        password: ${{ secrets.AZURE_REGISTRY_PASSWORD }}

    - name: Build and push API Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./api
        file: ./api/Dockerfile
        push: true
        target: production
        tags: |
          ${{ env.REGISTRY_NAME }}.azurecr.io/utmentor-api:latest
          ${{ env.REGISTRY_NAME }}.azurecr.io/utmentor-api:${{ github.sha }}
        cache-from: type=registry,ref=${{ env.REGISTRY_NAME }}.azurecr.io/utmentor-api:buildcache
        cache-to: type=registry,ref=${{ env.REGISTRY_NAME }}.azurecr.io/utmentor-api:buildcache,mode=max

    - name: Build and push Web Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile.web
        push: true
        tags: |
          ${{ env.REGISTRY_NAME }}.azurecr.io/utmentor-web:latest
          ${{ env.REGISTRY_NAME }}.azurecr.io/utmentor-web:${{ github.sha }}
        cache-from: type=registry,ref=${{ env.REGISTRY_NAME }}.azurecr.io/utmentor-web:buildcache
        cache-to: type=registry,ref=${{ env.REGISTRY_NAME }}.azurecr.io/utmentor-web:buildcache,mode=max

    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Deploy API to Azure Web App
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}-api
        images: ${{ env.REGISTRY_NAME }}.azurecr.io/utmentor-api:${{ github.sha }}

    - name: Deploy Web to Azure Web App
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}-web
        images: ${{ env.REGISTRY_NAME }}.azurecr.io/utmentor-web:${{ github.sha }}

    - name: Azure logout
      run: |
        az logout